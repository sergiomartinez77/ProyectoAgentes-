<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackito — Tu asistente de hábitos</title>
  <style>
    /* =============================================
       RESET & BASE
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #4f46e5, #9333ea);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* =============================================
       CONTENEDOR PRINCIPAL
       ============================================= */
    .chat-wrapper {
      width: 460px;
      height: 620px;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =============================================
       HEADER
       ============================================= */
    .chat-header {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      font-size: 28px;
      line-height: 1;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .bot-name {
      color: #ffffff;
      font-weight: bold;
      font-size: 16px;
    }

    .bot-status {
      color: #a5f3fc;
      font-size: 12px;
    }

    .reset-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #ffffff;
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    /* =============================================
       ÁREA DE MENSAJES
       ============================================= */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f8f7ff;
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #c4b5fd;
      border-radius: 10px;
    }

    /* =============================================
       MENSAJES
       ============================================= */
    .message {
      display: flex;
      max-width: 80%;
    }

    .message.bot  { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.bot .bubble {
      background: #eef2ff;
      color: #1e1b4b;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    /* =============================================
       INDICADOR DE ESCRITURA
       ============================================= */
    .bubble.typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .bubble.typing span {
      width: 8px;
      height: 8px;
      background: #9333ea;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* =============================================
       INPUT AREA
       ============================================= */
    .chat-input-area {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid #e0e7ff;
      background: #ffffff;
      flex-shrink: 0;
    }

    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #c4b5fd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area input:focus   { border-color: #4f46e5; }
    .chat-input-area input:disabled { background: #f1f5f9; cursor: not-allowed; }

    .chat-input-area button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .chat-input-area button:hover    { opacity: 0.9; }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* =============================================
       QUICK REPLIES
       ============================================= */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      padding-left: 4px;
    }

    .qr-btn {
      background: #ffffff;
      color: #4f46e5;
      border: 2px solid #4f46e5;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: auto;
      margin-top: 0;
    }

    .qr-btn:hover {
      background: #4f46e5;
      color: #ffffff;
    }

    /* =============================================
       SEPARADOR HR dentro de burbuja
       ============================================= */
    .bubble hr {
      border: none;
      border-top: 1px solid #c4b5fd;
      margin: 10px 0;
    }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 500px) {
      .chat-wrapper {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <div class="chat-wrapper">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar">⚡</div>
      <div class="header-info">
        <span class="bot-name">Trackito</span>
        <span class="bot-status">● En línea</span>
      </div>
      <button class="reset-btn" id="resetBtn" title="Nueva sesión">↺</button>
    </div>

    <!-- Mensajes -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Input -->
    <div class="chat-input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Escribe tu respuesta..."
        autocomplete="off"
      />
      <button id="sendBtn">Enviar</button>
    </div>

  </div>

  <script>
    const messagesEl = document.getElementById("chatMessages");
    const inputEl    = document.getElementById("userInput");
    const sendBtn    = document.getElementById("sendBtn");
    const resetBtn   = document.getElementById("resetBtn");

    function parseQuickReplies(text) {
      const lines = text.split("\n");
      const replies = [];
      lines.forEach(line => {
        const m = line.match(/^([1-9]️⃣)\s+(.+)/);
        if (m) {
          const num = m[1].replace("️⃣", "").replace(/\uFE0F/g, "");
          replies.push({ label: m[2].trim(), value: num });
        }
      });
      return replies;
    }

    function addMessage(text, role) {
      const wrap = document.createElement("div");
      wrap.classList.add("message", role);

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");

      const html = text
        .replace(/---/g, "<hr>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/_(.*?)_/g, "<em>$1</em>")
        .replace(/\n/g, "<br>");

      bubble.innerHTML = html;
      wrap.appendChild(bubble);

      if (role === "bot") {
        const replies = parseQuickReplies(text);
        if (replies.length > 0) {
          const qr = document.createElement("div");
          qr.classList.add("quick-replies");
          replies.forEach(r => {
            const btn = document.createElement("button");
            btn.classList.add("qr-btn");
            btn.textContent = r.label;
            btn.addEventListener("click", () => {
              document.querySelectorAll(".quick-replies").forEach(el => el.remove());
              sendMessage(r.value);
            });
            qr.appendChild(btn);
          });
          wrap.appendChild(qr);
        }
      }

      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement("div");
      wrap.classList.add("message", "bot");
      wrap.id = "typing";
      const bubble = document.createElement("div");
      bubble.classList.add("bubble", "typing");
      bubble.innerHTML = "<span></span><span></span><span></span>";
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function sendMessage(text) {
      if (!text.trim()) return;

      addMessage(text, "user");
      inputEl.value = "";
      inputEl.disabled = true;
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensaje: text }),
        });
        const data = await res.json();
        hideTyping();
        addMessage(data.respuesta || data.error, "bot");
      } catch {
        hideTyping();
        addMessage("❌ Error de conexión. Intenta de nuevo.", "bot");
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function iniciarChat() {
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensaje: "__inicio__" }),
        });
        const data = await res.json();
        addMessage(data.respuesta, "bot");
      } catch {
        addMessage("❌ No se pudo conectar con el servidor.", "bot");
      }
    }

    async function resetChat() {
      messagesEl.innerHTML = "";
      try {
        const res = await fetch("/api/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        });
        const data = await res.json();
        addMessage(data.respuesta, "bot");
      } catch {
        addMessage("❌ Error al reiniciar.", "bot");
      }
    }

    sendBtn.addEventListener("click", () => sendMessage(inputEl.value));
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage(inputEl.value);
    });
    resetBtn.addEventListener("click", resetChat);

    iniciarChat();
  </script>

</body>
</html>
